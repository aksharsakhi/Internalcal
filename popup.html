<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --ic-primary: #007bff;
            --ic-bg: #0a0a0a;
            --ic-text: #ffffff;
            --ic-border: #2a2a2a;
        }

        body {
            width: 300px;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--ic-bg);
            color: var(--ic-text);
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--ic-primary);
        }

        .btn {
            background: var(--ic-primary);
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-bottom: 10px;
            transition: transform 0.1s, background-color 0.2s;
            display: block;
        }

        .btn:hover {
            background-color: var(--ic-primary-dark, #0056b3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .info {
            font-size: 13px;
            color: #b0b0b0;
            line-height: 1.5;
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #555;
            text-align: center;
        }

        .usage-box {
            margin-top: 15px;
            padding: 12px;
            background: #161616;
            border-radius: 8px;
            border: 1px solid var(--ic-border);
        }

        .usage-title {
            font-weight: bold;
            color: var(--ic-primary);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .usage-list {
            margin: 0;
            padding-left: 18px;
            font-size: 12px;
            color: #d0d0d0;
        }

        .usage-list li {
            margin-bottom: 6px;
        }
    </style>
    <title>InternalCalc Popup</title>
</head>

<body>
    <div class="header">
        <div class="logo">InternalCalc</div>
    </div>

    <p class="info">
        Navigate to the <strong>Marks</strong> section in the Amrita Student Portal to start calculating your internals.
    </p>

    <button id="open-marks-btn" class="btn">
        Open Marks Page
    </button>

    <div class="usage-box">
        <div class="usage-title">How it works:</div>
        <ul class="usage-list">
            <li>It scrapes marks automatically.</li>
            <li>You can adjust the "Weight" (Converted To) for each exam.</li>
        </ul>
    </div>

    <div class="footer">
        &copy; 2026 InternalCalc Pro
    </div>

    <script src="popup.js"></script>
</body>

</html>
