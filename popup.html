<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --ic-primary: #007bff;
            --ic-bg: #0a0a0a;
            --ic-text: #ffffff;
            --ic-border: #2a2a2a;
        }

        body {
            width: 300px;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--ic-bg);
            color: var(--ic-text);
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--ic-primary);
        }

        .btn {
            background: var(--ic-primary);
            color: #ffffff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            margin-bottom: 10px;
            transition: transform 0.1s, background-color 0.2s;
            display: block;
            width: 100%;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .steps-box {
            padding: 12px;
            background: #161616;
            border-radius: 8px;
            border: 1px solid var(--ic-border);
            margin-bottom: 14px;
        }

        .steps-title {
            font-weight: bold;
            color: var(--ic-primary);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .steps-list {
            margin: 0;
            padding-left: 18px;
            font-size: 12px;
            color: #d0d0d0;
            line-height: 1.7;
        }

        .steps-list li {
            margin-bottom: 4px;
        }

        .url-box {
            background: #1a1a1a;
            border: 1px solid var(--ic-border);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 11px;
            color: var(--ic-primary);
            font-family: monospace;
            word-break: break-all;
            margin: 8px 0;
            user-select: all;
            cursor: text;
        }

        .footer {
            margin-top: 16px;
            font-size: 11px;
            color: #555;
            text-align: center;
        }
    </style>
    <title>InternalCalc Popup</title>
</head>

<body>
    <div class="header">
        <div class="logo">InternalCalc</div>
    </div>

    <div class="steps-box">
        <div class="steps-title">How to use:</div>
        <ol class="steps-list">
            <li>Log in to the <strong>Amrita Student Portal</strong></li>
            <li>Go to the <strong>Marks</strong> page:</li>
        </ol>
        <div class="url-box">students.amrita.edu/client/marks</div>
        <ol class="steps-list" start="3">
            <li>The widget appears <strong>automatically</strong></li>
            <li>Adjust weights for each assessment</li>
            <li>Your internals are calculated <strong>live</strong></li>
        </ol>
    </div>

    <button id="toggle-widget-btn" class="btn">
        Toggle InternalCalc Widget
    </button>

    <div class="footer">
        <div style="font-style: italic; margin-bottom: 4px; color: #888;">All the best for your exams! &#127808;</div>
        &copy; 2026 InternalCalc Pro
    </div>

    <script src="popup.js"></script>
</body>

</html>
